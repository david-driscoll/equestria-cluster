---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-env
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshPolicy: Periodic
  refreshInterval: 4m
  target:
    name: ${APP}-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
        annotations:
          reloader.stakater.com/auto: "true"
      data:
        TZ: "${TIMEZONE}"
        DATA_DIR: "/data"
        MEILI_ADDR: "http://karakeep-meilisearch:7700"
        MEILI_MASTER_KEY: "{{ .karakeep_password }}"
        DISABLE_PASSWORD_AUTH: "true"
        DISABLE_SIGNUPS: "true"
        OAUTH_AUTO_REDIRECT: "true"
        OAUTH_PROVIDER_NAME: "${CLUSTER_TITLE}"
        # Optional OIDC fields - provide via 1Password item named '${APP}-oidc-credentials'
        OAUTH_WELLKNOWN_URL: "{{ .oidc_openid_configuration_url }}"
        OAUTH_CLIENT_ID: "{{ .oidc_client_id }}"
        OAUTH_CLIENT_SECRET: "{{ .oidc_client_secret }}"
  dataFrom:
    - extract:
        key: 'Karakeep Secret Key'
      rewrite:
        - regexp:
            source: "[\\W]"
            target: _
        - regexp:
            source: "(.*)"
            target: "karakeep_$1"
    - extract:
        key: '${APP}-oidc-credentials'
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: cluster
      rewrite:
        - regexp:
            source: "[\\W]"
            target: _
        - regexp:
            source: "(.*)"
            target: "oidc_$1"
