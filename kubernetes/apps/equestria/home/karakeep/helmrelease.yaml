---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app karakeep
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 15m
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      *app:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
        containers:
          *app:
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.31.0
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: ${APP}-env
            env:
              TZ: "${TIMEZONE}"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1
                memory: 1Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /data
    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          http:
            port: *port
            targetPort: *port
    ingress:
      app:
        enabled: true
        className: internal
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
        hosts:
          - host: &host ${APP}.${ROOT_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
          - host: ${APP}.${TAILSCALE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: ${APP}-tls
            hosts:
              - *host
---
apiVersion: v1
kind: Service
metadata:
  name: ${APP}-meilisearch
  labels:
    app: ${APP}-meilisearch
spec:
  ports:
    - port: 7700
      targetPort: 7700
      protocol: TCP
      name: http
  selector:
    app: ${APP}-meilisearch
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP}-meilisearch
  labels:
    app: ${APP}-meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APP}-meilisearch
  template:
    metadata:
      labels:
        app: ${APP}-meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.37.0
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: ${APP}-env
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - name: meili-data
              mountPath: /meili_data
      volumes:
        - name: meili-data
          persistentVolumeClaim:
            claimName: ${APP}-meilisearch-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}-meilisearch-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
