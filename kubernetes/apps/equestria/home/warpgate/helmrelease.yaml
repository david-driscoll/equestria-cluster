---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app warpgate
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  timeout: 10m
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          *app :
            image:
              repository: ghcr.io/warp-tech/warpgate
              tag: latest@sha256:a12b1abb9de0714ef068fbf875ed1ad749f3a4c16fdd0e62b373aad4cdc07309
            args:
              - run
              - --config
              - /etc/warpgate.yaml
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /@warpgate/api/info
                    port: 8888
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    service:
      *app :
        ports:
          http:
            port: &port 8888

    persistence:
      config:
        type: secret
        name: warpgate-config
        globalMounts:
          - path: /etc/warpgate.yaml
            subPath: warpgate.yaml
            readOnly: true
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data

    route:
      external:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "warpgate.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: *app
                port: *port
