---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./externalsecret.yaml
  - ./definition.yaml
  - ./roles.yaml
configMapGenerator:
  - name: warpgate-config
    files:
      - warpgate.yaml=./resources/config.yaml
    options:
      disableNameSuffixHash: true
