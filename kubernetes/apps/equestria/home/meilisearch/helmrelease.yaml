---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: meilisearch
spec:
  interval: 1h
  url: https://meilisearch.github.io/meilisearch-kubernetes
---
# HelmRelease for standalone MeiliSearch (broken out from karakeep)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meilisearch
spec:
  chart:
    spec:
      chart: meilisearch
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: meilisearch
  maxHistory: 3
  interval: 1h
  timeout: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    auth:
      existingMasterKeySecret: meilisearch-env
    fullnameOverride: meilisearch
    envFrom:
      - secretRef:
          name: meilisearch-env
    env:
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: "production"

    persistence:
      enabled: true
      existingClaim: meilisearch
    serviceMonitor:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
