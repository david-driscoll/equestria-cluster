---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tududi
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 15m
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          *app :
            image:
              repository: docker.io/chrisvel/tududi
              tag: 1.3.0@sha256:b63b2ec97487dcd62fb29d58c002d7a4887b97f1d4684de7d9a2262c6a439d41
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: ${APP}-env
            env:
              TZ: "${TIMEZONE}"
              NODE_ENV: production
              PORT: &port 3002
              HOST: "0.0.0.0"
              # Reverse proxy
              TUDUDI_TRUST_PROXY: "true"
              TUDUDI_ALLOWED_ORIGINS: "https://${APP}.${ROOT_DOMAIN}"
              # OIDC/SSO — credentials injected via ExternalSecret
              OIDC_ENABLED: "true"
              OIDC_PROVIDER_NAME: "Authentik"
              OIDC_PROVIDER_SLUG: "authentik"
              OIDC_SCOPE: "openid profile email"
              OIDC_AUTO_PROVISION: "true"
              # BASE_URL constructs the OIDC redirect URI: ${BASE_URL}/api/oidc/callback/authentik
              BASE_URL: "https://${APP}.${ROOT_DOMAIN}"
              # CalDAV — clients connect to https://${APP}.${ROOT_DOMAIN}/caldav/
              CALDAV_ENABLED: "true"
              FF_ENABLE_CALDAV: "true"
              # Database stored at /app/backend/db/production.sqlite3
              DB_FILE: "db/production.sqlite3"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 4
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          *app :
            *app :
              - path: /app/backend/db
                subPath: db
              - path: /app/backend/uploads
                subPath: uploads

    service:
      *app :
        controller: *app
        type: ClusterIP
        ports:
          http:
            port: *port

    route:
      internal:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "${APP}.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: *app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
