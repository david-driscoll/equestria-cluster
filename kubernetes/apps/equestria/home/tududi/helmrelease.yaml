---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tududi
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 15m
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        initContainers:
          fix-permissions:
            image:
              repository: busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                chown -R 1001:1001 /app/backend/db /app/backend/uploads || true
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: true
        containers:
          *app :
            image:
              repository: docker.io/chrisvel/tududi
              tag: 1.1.0@sha256:c0954cc6195c797f65d27a2c99df344d5d74b65e3745750a2617c5605287cb5d
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: ${APP}-env
            env:
              TZ: "${TIMEZONE}"
              NODE_ENV: production
              PORT: &port 3002
              HOST: "0.0.0.0"
              # Reverse proxy
              TUDUDI_TRUST_PROXY: "true"
              TUDUDI_ALLOWED_ORIGINS: "https://${APP}.${ROOT_DOMAIN}"
              # OIDC/SSO — credentials injected via ExternalSecret
              OIDC_ENABLED: "true"
              OIDC_PROVIDER_NAME: "Authentik"
              OIDC_PROVIDER_SLUG: "authentik"
              OIDC_SCOPE: "openid profile email"
              OIDC_AUTO_PROVISION: "true"
              # BASE_URL constructs the OIDC redirect URI: ${BASE_URL}/api/oidc/callback/authentik
              BASE_URL: "https://${APP}.${ROOT_DOMAIN}"
              # CalDAV — clients connect to https://${APP}.${ROOT_DOMAIN}/caldav/
              CALDAV_ENABLED: "true"
              FF_ENABLE_CALDAV: "true"
              # Database stored at /app/backend/db/production.sqlite3
              DB_FILE: "db/production.sqlite3"
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 4
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
              runAsNonRoot: true
              runAsUser: 1001
              runAsGroup: 1001
    defaultPodOptions:
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          *app :
            *app :
              - path: /app/backend/db
                subPath: db
              - path: /app/backend/uploads
                subPath: uploads
            fix-permissions:
              - path: /app/backend/db
                subPath: db
              - path: /app/backend/uploads
                subPath: uploads

    service:
      *app :
        controller: *app
        type: ClusterIP
        ports:
          http:
            port: *port

    route:
      internal:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "${APP}.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: *app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
