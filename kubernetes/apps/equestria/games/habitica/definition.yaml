---
# yaml-language-server: $schema=https://raw.githubusercontent.com/david-driscoll/stargate-command-cluster/refs/heads/main/schemas/definition.schema.json
apiVersion: driscoll.dev/v1
kind: ApplicationDefinition
metadata:
  name: habitica
spec:
  name: "Habitica"
  category: Applications
  description: "Self-hosted Habitica (gameified habit tracker). Requires MongoDB and SMTP for email."
  url: &url https://${APP}.${ROOT_DOMAIN}
  icon: https://raw.githubusercontent.com/awinterstein/habitica/main/website/client/assets/icons/icon-512.png
  access_policy:
    groups:
      - family
  authentik:
    proxy:
      mode: "forward_single"
      externalHost: *url
  gatus:
    - group: "Applications"
      url: *url
      method: GET
      conditions:
        - "[STATUS] == 200"
