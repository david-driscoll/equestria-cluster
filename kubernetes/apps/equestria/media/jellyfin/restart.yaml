---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: jellyfin-restart
  namespace: eris
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jellyfin-restart
  namespace: eris
rules:
  - apiGroups: ["apps", "extensions"]
    resources: ["deployments"]
    resourceNames: ["jellyfin"]
    verbs: ["get", "patch", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jellyfin-restart
  namespace: eris
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jellyfin-restart
subjects:
  - kind: ServiceAccount
    name: jellyfin-restart
    namespace: eris
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyfin-restart
  namespace: eris
spec:
  concurrencyPolicy: Forbid
  schedule: '0 8 * * *'
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: jellyfin-restart
          restartPolicy: Never
          containers:
            - name: kubectl
              image: bitnami/kubectl@sha256:d80c09afa570a14cf6d32ca09ca610b5701eb0a08c655b5bb820194b218078eb
              command:
                - 'kubectl'
                - 'rollout'
                - 'restart'
                - 'deployment/jellyfin'
