---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dispatcharr-addons
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          chown-dbdir:
            image:
              repository: alpine
              tag: 3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                chmod 0750 /data/db
            securityContext:
              runAsUser: 0
              fsGroupChangePolicy: OnRootMismatch
          identifiarr-db:
            image:
              repository: golang
              tag: 1.26.1-bookworm@sha256:c7a82e9e2df2fea5d8cb62a16aa6f796d2b2ed81ccad4ddd2bc9f0d22936c3f2
              pullPolicy: IfNotPresent
            command:
              - /scripts/init-identifiarr-db.sh

        containers:
          ecm:
            image:
              repository: ghcr.io/motwakorb/enhancedchannelmanager
              tag: "0.14@sha256:cfee7005d84503e5c584731c8950eeb0d24501cefdf585aaa8f305a73b698f67"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &ecm-port 6100
                  initialDelaySeconds: 10
                  periodSeconds: 20
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
          game-thumbs:
            image:
              repository: ghcr.io/sethwv/game-thumbs
              tag: v1.6.0@sha256:1d0cf5f0f42678df5b2e7714b4cb2bbacf66513d46b241b03ec7fd1e3d37e546
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          identifiarr:
            image:
              repository: ghcr.io/egyptiangio/channelidentifiarr
              tag: "0.6.5@sha256:d883c0eb43e369fd78d59f11aaf1dcef8783ae663d92a088c7c07050b48adc23"
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
          teamarr:
            image:
              repository: ghcr.io/pharaoh-labs/teamarr
              tag: "2.3.0@sha256:804bd2077f39577eb290f403501e35a977d1deaba9116cdac3b81955d4be8da6"
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &teamarr-port 9195
                  initialDelaySeconds: 10
                  periodSeconds: 20
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
          kptv-fast:
            image:
              repository: ghcr.io/kpirnie/kptv-fast
              tag: latest@sha256:8db83c10a0b3f53ce3d3ff1757a7e69d6eec0504d6a7320a06532b38815b2092
            env:
              CACHE_DURATION: 86400
              WARM_CACHE_ON_STARTUP: true
              STARTUP_CACHE_DELAY: 10
              WARM_EPG_ON_STARTUP: true
              MAX_WORKERS: 5
              PROVIDER_TIMEOUT: 60
              ENABLED_PROVIDERS: all
              GIT_COUNTRY: us,ca,uk
              LG_COUNTRY: us,ca,uk
              WHALE_COUNTRY: us
              DEBUG: false
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: &kptv-fast-port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 20
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
          # xtream-strm:
          #   image:
          #     repository: mourabena2ui/xtream-to-strm-web
          #     tag: "v3.1.0@sha256:eb722cf936af885facbf70be52abea622b1a643dcb6e558ffcf0927e2e305e0a"
          #   env:
          #     TZ: ${TIMEZONE}
          #   resources:
          #     requests:
          #       cpu: 10m
          #       memory: 128Mi
          #     limits:
          #       memory: 2Gi

    # -- Configures service settings for the chart.
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: intel.feature.node.kubernetes.io/gpu
                operator: In
                values:
                - "true"
    service:
      ecm:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: *ecm-port
      game-thumbs:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &game-thumbs-port 3000
      identifiarr:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &identifiarr-port 9192
      teamarr:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: *teamarr-port
      kptv-fast:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: *kptv-fast-port
      # xtream-strm:
      #   controller: app
      #   type: ClusterIP
      #   ports:
      #     http:
      #       port: &xtream-strm-port 8000

    configMaps:
      init-identifiarr:
        forceRename: init-identifiarr
        data:
          init-identifiarr-db.sh: |
            #!/bin/sh
            db_file="/data/channelidentifiarr.db"
            etag_file="/data/.channelidentifiarr.db.etag"
            tmpfile="/tmp/channelidentifiarr.db"

            # Get server ETag
            server_etag=$(curl -fsSL -I https://epg.jesmann.com/channelidentifiarr.db | grep -i etag | cut -d' ' -f2 | tr -d '\r\n' || echo "")

            # Compare with stored ETag
            if [ -f "$etag_file" ] && [ -f "$db_file" ]; then
              local_etag=$(cat "$etag_file")
              if [ "$server_etag" = "$local_etag" ]; then
                echo "Database is up to date (ETag: $server_etag)"
                exit 0
              fi
            fi

            # Download new version
            echo "Downloading database (ETag: $server_etag)"
            curl -fsSL -o "$tmpfile" https://epg.jesmann.com/channelidentifiarr.db
            if [ -s "$tmpfile" ]; then
              mv -f "$tmpfile" "$db_file"
              echo "$server_etag" > "$etag_file"
              echo "Database updated successfully"
            else
              rm -f "$tmpfile"
              echo "Download failed"
              exit 1
            fi

    persistence:
      config:
        existingClaim: ${APP}
        advancedMounts:
          app:
            chown-dbdir:
              - path: /data
            ecm:
              - path: /config
                subPath: ecm
            game-thumbs:
              - path: /app/.cache
                subPath: game-thumbs/cache
            identifiarr:
              - path: /data
                subPath: identifiarr
            teamarr:
              - path: /app/data
                subPath: teamarr
            identifiarr-db:
              - path: /data
                subPath: identifiarr
            # xtream-strm:
            #   - path: /db
            #     subPath: xtream-strm
      media:
        existingClaim: truenas-media
      scripts:
        type: configMap
        name: init-identifiarr
        defaultMode: 493
        globalMounts:
          - path: /scripts/init-identifiarr-db.sh
            subPath: init-identifiarr-db.sh

      tmpfs:
        type: emptyDir
        globalMounts:
            - path: /tmp

    route:
      ecm:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "dispatcharr-ecm.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: ecm
                port: *ecm-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
      identifiarr:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "dispatcharr-identifiarr.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: identifiarr
                port: *identifiarr-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
      teamarr:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "dispatcharr-teamarr.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: teamarr
                port: *teamarr-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user

      game-thumbs:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "dispatcharr-thumbs.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: game-thumbs
                port: *game-thumbs-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
      kptv-fast:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "kptv-fast.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: kptv-fast
                port: *kptv-fast-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user

      # xtream-strm:
      #   parentRefs:
      #     - name: internal
      #       namespace: network
      #       kind: Gateway
      #   hostnames:
      #     - "dispatcharr-xtream-strm.${ROOT_DOMAIN}"
      #   kind: HTTPRoute
      #   rules:
      #     - backendRefs:
      #         - identifier: xtream-strm
      #           port: *xtream-strm-port
      #       filters:
      #         - type: ExtensionRef
      #           extensionRef:
      #             group: traefik.io
      #             kind: Middleware
      #             name: local-user
