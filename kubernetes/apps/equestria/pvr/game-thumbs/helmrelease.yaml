---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app game-thumbs
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/sethwv/game-thumbs
              tag: v1.8.1@sha256:15081614ef049ff4a1689f0462b1a1d4d65c28b23b5938f85eb9571ef0d1a55c
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            env:
              ALLOW_EVENT_OVERLAYS: "true"
              IMAGE_CACHE_HOURS: "24"
              RATE_LIMIT_PER_MINUTE: "0"

    service:
      app:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &port 3000

    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /app/.cache
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      app:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "dispatcharr-thumbs.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
