---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app xtream-to-strm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          chown-dbdir:
            image:
              repository: alpine
              tag: 3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
            args:
              - |
                chmod 0750 /db
            securityContext:
              runAsUser: 0
              # fsGroupChangePolicy: OnRootMismatch

        containers:
          xtream-strm:
            image:
              repository: mourabena2ui/xtream-to-strm-web
              tag: "v4.1.6@sha256:2f18fed26f0307ce652b76658ec730de39e3dcab15780eb8602fc491b2b2298c"
            env:
              TZ: ${TIMEZONE}
              DATABASE_URL: sqlite:///db/xtream.db
              SERIES_USE_SEASON_FOLDERS: "true"
              SERIES_USE_CATEGORY_FOLDERS: "false"
              MOVIE_USE_CATEGORY_FOLDERS: "false"
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi

    service:
      xtream-strm:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &xtream-strm-port 8000

    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /db
      media:
        existingClaim: truenas-media
      tmpfs:
        type: emptyDir
        globalMounts:
            - path: /tmp

    route:
      xtream-strm:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "xtream-strm.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: xtream-strm
                port: *xtream-strm-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
