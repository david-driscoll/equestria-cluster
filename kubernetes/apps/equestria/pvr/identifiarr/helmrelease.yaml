---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app identifiarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        initContainers:
          identifiarr-db:
            image:
              repository: golang
              tag: 1.26.4-bookworm@sha256:5f68ec6805843bd3981a951ffada82a26a0bd2631045c8f7dba483fa868f5ec5
              pullPolicy: IfNotPresent
            command:
              - /scripts/init-identifiarr-db.sh
        containers:
          app:
            image:
              repository: ghcr.io/egyptiangio/channelidentifiarr
              tag: "0.6.5@sha256:d883c0eb43e369fd78d59f11aaf1dcef8783ae663d92a088c7c07050b48adc23"
            env:
              TZ: ${TIMEZONE}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &port 9192

    configMaps:
      init-identifiarr:
        forceRename: init-identifiarr
        data:
          init-identifiarr-db.sh: |
            #!/bin/sh
            db_file="/data/channelidentifiarr.db"
            etag_file="/data/.channelidentifiarr.db.etag"
            tmpfile="/tmp/channelidentifiarr.db"

            # Get server ETag
            server_etag=$(curl -fsSL -I https://epg.jesmann.com/channelidentifiarr.db | grep -i etag | cut -d' ' -f2 | tr -d '\r\n' || echo "")

            # Compare with stored ETag
            if [ -f "$etag_file" ] && [ -f "$db_file" ]; then
              local_etag=$(cat "$etag_file")
              if [ "$server_etag" = "$local_etag" ]; then
                echo "Database is up to date (ETag: $server_etag)"
                exit 0
              fi
            fi

            # Download new version
            echo "Downloading database (ETag: $server_etag)"
            curl -fsSL -o "$tmpfile" https://epg.jesmann.com/channelidentifiarr.db
            if [ -s "$tmpfile" ]; then
              mv -f "$tmpfile" "$db_file"
              echo "$server_etag" > "$etag_file"
              echo "Database updated successfully"
            else
              rm -f "$tmpfile"
              echo "Download failed"
              exit 1
            fi

    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /data
      scripts:
        type: configMap
        name: init-identifiarr
        defaultMode: 493
        globalMounts:
          - path: /scripts/init-identifiarr-db.sh
            subPath: init-identifiarr-db.sh
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      app:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "identifiarr.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
