---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ${APP}-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DB_HOST: "{{ .postgres_hostname }}"
        DB_PORT: "{{ .postgres_port }}"
        DB_NAME: "{{ .postgres_database }}"
        DB_USER: "{{ .postgres_username }}"
        DB_PASSWD: "{{ .postgres_password }}"
        TMDB_API_KEY: {{ .tmdb_password }}
  dataFrom:
    - extract:
        key: TMDB API Key
      rewrite:
        - regexp:
            source: "[\\W]"
            target: _
    - extract:
        key: '${APP}-postgres'
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: database
      rewrite:
        - regexp:
            source: "(.*)"
            target: "postgres_$1"
