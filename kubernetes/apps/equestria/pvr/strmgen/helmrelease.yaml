---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app strmgen
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          strmgen:
            image:
              repository: mercenaryjustice/strmgen
              tag: latest@sha256:a9e94f4f0776bd8c2b4d6cf6b18be3d49dfe3f8175e310bea1814c74c5ee55b8
            envFrom:
              - secretRef:
                  name: ${APP}-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi

    service:
      strmgen:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: &strmgen-port 8808

    route:
      strmgen:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "strmgen.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: strmgen
                port: *strmgen-port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
