---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}-env
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshPolicy: Periodic
  refreshInterval: 4m
  target:
    name: ${APP}-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
        annotations:
          reloader.stakater.com/auto: "true"
      data:
        SEARCH_API_URL: "https://search.pinepods.online/api/search"
        PEOPLE_API_URL: "https://people.pinepods.online/api/hosts"
        TZ: "${TIMEZONE}"
        DB_TYPE: "postgresql"
        DB_HOST: "{{ .postgres_hostname }}"
        DB_PORT: "{{ .postgres_port }}"
        DB_USER: "{{ .postgres_username }}"
        DB_PASSWORD: "{{ .postgres_password }}"
        DB_NAME: "{{ .postgres_database }}"
        VALKEY_HOST: "valkey.database.svc.cluster.local"
        VALKEY_PORT: "6379"
        # OIDC / OAuth2 (auto-discovery preferred via issuer)
        OIDC_DISABLE_STANDARD_LOGIN: "true"
        OIDC_PROVIDER_NAME: "${CLUSTER_TITLE}"
        OIDC_AUTHORIZATION_URL: "{{ .oidc_authorization_url }}"
        OIDC_TOKEN_URL: "{{ .oidc_token_url }}"
        OIDC_USER_INFO_URL: "{{ .oidc_userinfo_url }}"
        OIDC_CLIENT_ID: "{{ .oidc_client_id }}"
        OIDC_CLIENT_SECRET: "{{ .oidc_client_secret }}"
        OIDC_ADMIN_ROLE: "admin"
  dataFrom:
    - extract:
        key: '${APP}-postgres'
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: database
      rewrite:
        - regexp:
            source: "[\\W]"
            target: _
        - regexp:
            source: "(.*)"
            target: "postgres_$1"
    - extract:
        key: '${APP}-oidc-credentials'
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: cluster
      rewrite:
        - regexp:
            source: "[\\W]"
            target: _
        - regexp:
            source: "(.*)"
            target: "oidc_$1"
