---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app technitium
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 1h
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: false
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
          k8s.v1.cni.cncf.io/networks: technitium-dns-net
        containers:
          *app :
            image:
              repository: technitium/dns-server
              tag: 15.2.0@sha256:23d3b63d959e997800b095fe93009b3fae271b5258234ff2ade8535cb33682c8
            env:
              # These are applied on first start only (ignored if /etc/dns config already exists)
              DNS_SERVER_DOMAIN: ${CLUSTER_CNAME}.technitium.driscoll.tech
              DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "true"
              DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT: "true"
              DNS_SERVER_RECURSION: AllowOnlyForPrivateNetworks
              # DNS_SERVER_FORWARDERS: "1.1.1.1, 1.0.0.1, 9.9.9.9"
              # DNS_SERVER_FORWARDER_PROTOCOL: Tls
              DNS_SERVER_ENABLE_BLOCKING: "true"
              DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP: "true"
              # SSO static env vars (first-start only — init-job applies them at runtime too)
              DNS_SERVER_SSO_ENABLED: "true"
              DNS_SERVER_SSO_ALLOW_SIGNUP: "true"
              DNS_SERVER_SSO_ALLOW_SIGNUP_ONLY_FOR_MAPPED_USERS: "true"
              DNS_SERVER_SSO_GROUP_MAP: "admins:Administrators"
              # Bind the DNS service to the ipvlan interface IP so cluster peers can reach it
              DNS_SERVER_LOCAL_ENDPOINTS: "${TECHNITIUM_VIP}:53443"
            envFrom:
              - secretRef:
                  name: ${APP}-env
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &adminPort 5380
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *adminPort
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      # Pin to a worker node labeled `technitium-dns=true` (must have enp2s0 NIC)
      # Label a node: kubectl label node <node-name> technitium-dns=true
      nodeSelector:
        technitium-dns: "true"

    service:
      # DNS traffic (port 53 UDP/TCP) is handled directly by the ipvlan interface (see macvlan-nad.yaml).
      # No LoadBalancer service is needed for DNS — TECHNITIUM_VIP is owned by the pod's net1 interface.
      admin:
        controller: *app
        ports:
          admin:
            port: *adminPort
            protocol: TCP
          cluster-https:
            port: 53443
            protocol: TCP

    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /etc/dns

    route:
      admin:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - ${APP}.${CLUSTER_DOMAIN}
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: admin
                port: admin
