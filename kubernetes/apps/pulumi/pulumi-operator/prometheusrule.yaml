---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pulumi-stacks
spec:
  groups:
    - name: pulumi.stacks
      rules:
        - alert: PulumiStackFailed
          # type="Ready" status="False" with reason="RetryingAfterFailure" → metric value is 0
          expr: kube_stack_status_condition{type="Ready", reason="RetryingAfterFailure"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} is failing"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} is retrying after failures. Check the stack logs for details."

        - alert: PulumiStackStalled
          # type="Ready" status="False" with reason="Stalled" → metric value is 0
          expr: kube_stack_status_condition{type="Ready", reason="Stalled"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} is stalled"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} is stalled and cannot make progress."

        - alert: PulumiStackPrerequisiteNotSatisfied
          # type="Ready" status="False" with reason="PrerequisiteNotSatisfied" → metric value is 0
          expr: kube_stack_status_condition{type="Ready", reason="PrerequisiteNotSatisfied"} == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} prerequisites not satisfied for 30m"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} prerequisites have not been satisfied for 30 minutes."
