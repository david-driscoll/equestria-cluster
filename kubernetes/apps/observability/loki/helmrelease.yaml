---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: loki
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 7.1.0
    digest: sha256:8b25169abda42a74296b5c66f675c17ba83c0b6706a8bbc361f1940043f93c24
  url: oci://ghcr.io/grafana/helm-charts/loki
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: loki
  install:
    crds: Skip
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    crds: Skip
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      analytics:
        reporting_enabled: false
      commonConfig:
        replication_factor: 1
      compactor:
        working_directory: /var/loki/compactor/retention
        delete_request_store: filesystem
        retention_enabled: true
        retention_delete_delay: 1h
      ingester:
        chunk_encoding: snappy
      limits_config:
        retention_period: 3d
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32
        retention_stream:
          - selector: '{namespace="pulumi"}'
            priority: 1
            period: 24h
          - selector: '{namespace="flux-system"}'
            priority: 1
            period: 48h
      server:
        grpc_server_max_recv_msg_size: 10485760 # 10 MiB
        grpc_server_max_send_msg_size: 10485760 # 10 MiB
        log_level: info
      storage:
        type: filesystem
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      schemaConfig:
        configs:
          - from: "2024-04-01" # quote
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      structuredConfig:
        ruler:
          enable_api: true
          enable_alertmanager_v2: true
          alertmanager_url: http://alertmanager-operated.observability.svc.cluster.local:9093
          storage:
            type: local
            local:
              directory: /rules
          rule_path: /tmp/loki/rules-temp
    singleBinary:
      replicas: 1
      priorityClassName: observability-critical
      persistence:
        enabled: true
        storageClass: longhorn
        size: 60Gi
      service:
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: loki
          tailscale.com/tags: tag:observability
          tailscale.com/proxy-group: tailnet-outbound
    gateway:
      enabled: false
      replicas: 0
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    sidecar:
      image:
        repository: ghcr.io/kiwigrid/k8s-sidecar
        tag: "2.8.1@sha256:44065fae116464099acd5bfddb62dcb2cf53c8fa18948d215109d64a5560306e"
      enableUniqueFilenames: true
      rules:
        searchNamespace: ALL
        folder: /rules/fake
