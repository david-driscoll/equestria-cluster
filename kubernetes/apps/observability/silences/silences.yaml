---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: keda-hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
    - name: horizontalpodautoscaler
      value: keda-hpa-.*
      matchType: "=~"
---
# Silence Watchdog alert from equestria cluster
# Watchdog continuously fires to verify alerting pipeline health.
# Instead, we alert on absence of Watchdog (WatchdogMissing alert).
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: watchdog-equestria
spec:
  matchers:
    - name: alertname
      value: Watchdog
    - name: cluster
      value: equestria
---
# Silence Watchdog alert from sgc (stargate-command) cluster
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: watchdog-sgc
